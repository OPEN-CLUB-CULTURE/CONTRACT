<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#F0F0EE" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#F0F0EE" stroke-width="1"/>

  <!-- Green accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#00D64F"/>

  <!-- Big O mark -->
  <text x="600" y="360" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="320" fill="#00D64F" text-anchor="middle" dominant-baseline="auto" letter-spacing="-8">O</text>

  <!-- Rotating ring text (static version) -->
  <circle cx="600" cy="252" r="178" fill="none" stroke="#00D64F" stroke-width="1.5" opacity="0.35"/>
  <circle cx="600" cy="252" r="192" fill="none" stroke="#00D64F" stroke-width="0.8" opacity="0.2"/>

  <!-- OPEN CLUB top left -->
  <text x="56" y="64" font-family="'Space Mono', monospace" font-weight="700" font-size="14" fill="#0B0B0C" letter-spacing="4">OPEN CLUB</text>
  <text x="56" y="84" font-family="'Space Mono', monospace" font-weight="400" font-size="10" fill="#6B7280" letter-spacing="3">VISUAL INFRASTRUCTURE STUDIO</text>

  <!-- Dot indicator -->
  <circle cx="44" cy="59" r="5" fill="#00D64F"/>

  <!-- × QUEENCHIS bottom right -->
  <text x="1144" y="580" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="22" fill="#0B0B0C" text-anchor="end" letter-spacing="-0.5">× QUEENCHIS</text>
  <text x="1144" y="602" font-family="'Space Mono', monospace" font-weight="400" font-size="10" fill="#6B7280" text-anchor="end" letter-spacing="2">PROPUESTA ESTRATÉGICA 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="#00D64F"/>
</svg>
